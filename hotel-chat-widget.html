<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Ojos del Río — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --dark: #1a1611;
    --text: #3a3228;
    --muted: #8a7d6e;
    --bubble-bot: #ffffff;
    --bubble-user: #1a1611;
    --shadow: 0 20px 60px rgba(26,22,17,0.15);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 60%);
  }

  /* Floating button */
  #chat-toggle {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 60px;
    height: 60px;
    background: var(--dark);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(26,22,17,0.3);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
    z-index: 1000;
  }
  #chat-toggle:hover {
    transform: scale(1.08);
    box-shadow: 0 12px 40px rgba(26,22,17,0.4);
  }
  #chat-toggle svg { transition: transform 0.3s; }
  #chat-toggle.open svg.icon-chat { display: none; }
  #chat-toggle.open svg.icon-close { display: block !important; }

  /* Notification dot */
  #notif-dot {
    position: absolute;
    top: 6px; right: 6px;
    width: 12px; height: 12px;
    background: var(--gold);
    border-radius: 50%;
    border: 2px solid var(--cream);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.7; }
  }

  /* Chat window */
  #chat-window {
    position: fixed;
    bottom: 100px;
    right: 28px;
    width: 380px;
    height: 580px;
    background: white;
    border-radius: 24px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 999;
    transform: scale(0.85) translateY(20px);
    transform-origin: bottom right;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  }
  #chat-window.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* Header */
  .chat-header {
    background: var(--dark);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold) 0%, #a07828 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px; color: white; font-weight: 600;
    flex-shrink: 0;
    position: relative;
  }
  .avatar::after {
    content: '';
    position: absolute;
    bottom: 1px; right: 1px;
    width: 10px; height: 10px;
    background: #4ade80;
    border-radius: 50%;
    border: 2px solid var(--dark);
  }
  .header-info { flex: 1; }
  .header-name {
    font-family: 'Playfair Display', serif;
    color: white;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .header-sub {
    color: var(--gold-light);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .hotel-badge {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--gold);
    font-size: 11px;
    opacity: 0.8;
  }

  /* Messages area */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #faf9f7;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 2px; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold) 0%, #a07828 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 11px; color: white; font-weight: 600;
    flex-shrink: 0;
  }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.55;
    font-weight: 400;
  }
  .bubble.bot {
    background: white;
    color: var(--text);
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .bubble.user {
    background: var(--dark);
    color: white;
    border-bottom-right-radius: 4px;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex; align-items: center; gap: 4px;
    padding: 12px 16px;
  }
  .typing-dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  .chat-input-area {
    padding: 16px;
    background: white;
    border-top: 1px solid rgba(0,0,0,0.06);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    border: 1.5px solid #e8e0d5;
    border-radius: 14px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    background: #faf9f7;
    resize: none;
    max-height: 100px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  #user-input:focus { border-color: var(--gold); background: white; }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 40px; height: 40px;
    background: var(--dark);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s, background 0.2s;
  }
  #send-btn:hover { background: var(--gold); transform: scale(1.05); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Powered by */
  .powered-by {
    text-align: center;
    padding: 6px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
    background: white;
  }

  /* Demo page */
  .demo-page {
    text-align: center;
    padding: 40px;
  }
  .demo-page h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    color: var(--dark);
    margin-bottom: 8px;
  }
  .demo-page p {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }
  .demo-hint {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: white;
    border: 1.5px solid var(--gold-light);
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 13px;
    color: var(--text);
    box-shadow: 0 4px 16px rgba(201,168,76,0.1);
  }

  @media (max-width: 440px) {
    #chat-window { width: calc(100vw - 16px); right: 8px; bottom: 90px; height: 70vh; }
    #chat-toggle { bottom: 16px; right: 16px; }
  }
</style>
</head>
<body>

<div class="demo-page">
  <h1>Hotel Ojos del Río</h1>
  <p>Bella Vista, Panamá — Chat de Reservas</p>
  <div class="demo-hint">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    Haz clic en el botón de chat para comenzar
  </div>
</div>

<!-- Toggle button -->
<button id="chat-toggle" onclick="toggleChat()">
  <div id="notif-dot"></div>
  <svg class="icon-chat" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
  </svg>
  <svg class="icon-close" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" style="display:none">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</button>

<!-- Chat window -->
<div id="chat-window">
  <div class="chat-header">
    <div class="avatar">D</div>
    <div class="header-info">
      <div class="header-name">Dina González</div>
      <div class="header-sub">Asistente Virtual</div>
    </div>
    <div class="hotel-badge">Ojos del Río</div>
  </div>

  <div id="messages"></div>

  <div class="chat-input-area">
    <textarea id="user-input" placeholder="Escribe tu mensaje..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
        <path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/>
      </svg>
    </button>
  </div>
  <div class="powered-by">Powered by Virtual Human AI</div>
</div>

<script>
const WEBHOOK_URL = 'https://humnavirtual.app.n8n.cloud/webhook/b848d95c-e140-4024-ab62-e89c1fc4f5da';

let history = [];
let sessionId = 'session-' + Date.now();
let isOpen = false;
let isWaiting = false;
let greeted = false;

function toggleChat() {
  isOpen = !isOpen;
  const win = document.getElementById('chat-window');
  const btn = document.getElementById('chat-toggle');
  const dot = document.getElementById('notif-dot');

  win.classList.toggle('open', isOpen);
  btn.classList.toggle('open', isOpen);
  dot.style.display = 'none';

  if (isOpen && !greeted) {
    greeted = true;
    setTimeout(() => {
      addMessage('¡Hola! Soy Dina González del Hotel Ojos del Río. ¿En qué le puedo ayudar? ¿Le puedo ayudar con una reserva o tiene alguna consulta sobre el hotel?', 'bot');
      history.push({ role: 'assistant', content: '¡Hola! Soy Dina González del Hotel Ojos del Río. ¿En qué le puedo ayudar? ¿Le puedo ayudar con una reserva o tiene alguna consulta sobre el hotel?' });
    }, 600);
  }
}

function addMessage(text, role) {
  const msgs = document.getElementById('messages');

  // Remove typing indicator if exists
  const typing = document.getElementById('typing');
  if (typing) typing.remove();

  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = 'D';
    row.appendChild(av);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.textContent = text;
  row.appendChild(bubble);

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing';

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = 'D';
  row.appendChild(av);

  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  row.appendChild(bubble);

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendToAgent(message) {
  if (isWaiting) return;
  isWaiting = true;
  document.getElementById('send-btn').disabled = true;

  showTyping();

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, message, history })
    });

    const data = await res.json();
    const reply = data.reply || 'Lo siento, hubo un error. Por favor intente de nuevo.';
    // Use history from N8N which already includes both user and assistant messages
    history = data.history || history;

    addMessage(reply, 'bot');
  } catch (err) {
    addMessage('Lo siento, no puedo conectarme en este momento. Por favor llame al 6655-2233.', 'bot');
  }

  isWaiting = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('user-input').focus();
}

function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isWaiting) return;

  addMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  sendToAgent(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
</script>
</body>
</html>
